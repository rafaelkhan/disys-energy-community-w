spring.application.name=usage-service

spring.datasource.username=disysuser
spring.datasource.password=disyspw
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/energydb

# every service has its own flyway history table so they do not conflict
spring.flyway.table=flyway_history_usage_service
# the other service may have already created objects in the public schema,
# so allow flyway to baseline instead of failing on a non-empty schema
spring.flyway.baseline-on-migrate=true
# baseline at version 0 so that the V1 migration (creating our own table) still runs;
# the default baseline version is 1, which would skip V1
spring.flyway.baseline-version=0
